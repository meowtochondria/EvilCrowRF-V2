[common]
board = esp32dev
framework = arduino
board_build.partitions = partitions.csv

build_flags =
    -Os
    -ffunction-sections -fdata-sections -Wl,--gc-sections
    -DARDUINO_USB_MODE=0 -DARDUINO_USB_CDC_ON_BOOT=0
    -fexceptions -fno-threadsafe-statics
    -fmerge-all-constants -DDISABLE_ALL_LIBRARY_WARNINGS
    -DCORE_DEBUG_LEVEL=3 -I src

monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time


[env:evilcrow-bt]
platform = espressif32@^6.13.0
board = ${common.board}
framework = ${common.framework}
board_build.partitions = ${common.board_build.partitions}
board_build.flash_mode = qio
board_build.f_cpu = 240000000L

lib_deps =
    h2zero/NimBLE-Arduino@^2.5.0

build_flags =
    ${common.build_flags}
    -std=gnu++17
    -DEVILCROW_BT_MODE=1
    -DFIRMWARE_BUILD_SUFFIX="-bt"
    -DCONFIG_BT_ENABLED=1
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
    -DCONFIG_BT_NIMBLE_ROLE_CENTRAL_DISABLED
    -DCONFIG_BT_NIMBLE_ROLE_OBSERVER_DISABLED
    -DCONFIG_BT_NIMBLE_HOST_TASK_STACK_SIZE=8192

build_unflags = -std=gnu++11

lib_ignore = HTTPUpdate

# Exclude WiFi sources from BT build
build_src_filter = +<*> -<core/wifi/>

monitor_speed = ${common.monitor_speed}
monitor_filters = ${common.monitor_filters}

[env:evilcrow-wifi]
platform = espressif32@^6.13.0
board = ${common.board}
framework = ${common.framework}
board_build.partitions = ${common.board_build.partitions}
board_build.flash_mode = qio
board_build.f_cpu = 240000000L

lib_deps =
    https://github.com/ESP32Async/AsyncTCP.git#v3.4.10
    https://github.com/ESP32Async/ESPAsyncWebServer.git#v3.11.1

build_flags =
    ${common.build_flags}
    -std=gnu++17
    -DEVILCROW_WIFI_MODE=1
    -DFIRMWARE_BUILD_SUFFIX="-wifi"
    -DCONFIG_BT_ENABLED=0
    -DCONFIG_BT_NIMBLE_ENABLED=0
    -DCONFIG_LWIP_TCP_MSS=1460
    -DCONFIG_LWIP_TCP_WND=5840
    -DCONFIG_LWIP_TCP_SND_BUF=2920
    -DCONFIG_LWIP_TCP_RCV_BUF=2920
    -DCONFIG_LWIP_MAX_SOCKETS=4
    -DCONFIG_MDNS_MAX_SERVICES=1
    -DASYNC_TCP_QUEUE_SIZE=32
    -DWS_MAX_QUEUED_MESSAGES=32
    -DWS_LOG_LEVEL=3

build_unflags = -std=gnu++11

lib_ignore = NimBLE-Arduino, HTTPUpdate

# Exclude BLE sources from WiFi build
build_src_filter = +<*> -<core/ble/>

monitor_speed = ${common.monitor_speed}
monitor_filters = ${common.monitor_filters}
